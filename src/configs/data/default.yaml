# @package _global_
dataset:
  # Train split: used by train.py with split_train_val (hold-out val for training curves).
  train_dir: /Data/arthus.wauquiez/processed_data/train
  # Full validation split: used by evaluate.py (no random split; entire folder).
  val_dir: /Data/arthus.wauquiez/processed_data/val
  # Test frames root for create_submission.py
  test_dir: /Data/arthus.wauquiez/processed_data/test
  submission_output: /Data/arthus.wauquiez/processed_data/submission.csv

  num_frames: 4
  val_ratio: 0.2
  seed: 42
  max_samples: null
  # "standard": Resize + RandomHorizontalFlip (baseline)
  # "strong": RandomResizedCrop + ColorJitter + RandomGrayscale (recommended)
  augmentation: standard
